<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
    <form>
        <label for="name">Name</label>
        <input type="text" id="name" value="" name="name" placeholder="Enter name"><br>

        <label for="age">Age</label>
        <input type="number" name="age" id="age" value="age"><br>

        <label for="gender">Gender</label>
        <input type="radio" name="gender" value="Male">Male
        <input type="radio"name="gender" value="Female">Female
        <input type="radio" name="gender"value="Others">Others<br>

        <label for="subject">Subject</label><br>
        <input type="checkbox" name="subject" value="C">C
        <input type="checkbox" name="subject" value="C++">C++
        <input type="checkbox" name="subject" value="Java">Java
        <input type="checkbox" name="subject" value="Python">Pyhton
        <input type="checkbox" name="subject" value="Ruby">Ruby

        <label for=""></label><br>
        
        <label for="password" value="">Password</label>
        <input type="password" name="password" placeholder="Enter password"><br>

        <input type="file"><br>

        <input type="date"><br>

        <input type="time"><br>

        <label for="">Choose date and time</label>
        <input type="datetime-local"><br>

        <label type="email">Email</label>
        <input type="email"><br>

        <label for="">Pick a colour</label>
        <input type="color"><br>

        <label for="">Range</label>
        <input type="range"><br>

        <button type="submit">Submit</button>




    </form>
</body>
</html>
